<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<title>進階族譜系統</title>
<script src="familytree.js"></script>
<style>
  body { font-family: Arial; margin:0; padding:0; background:#f9f9f9; }
  h1 { text-align:center; margin:20px 0; }
  #tree { width:100%; height:700px; border:1px solid #ccc; margin:0 auto; background:#fff; }
  .ft-node { 
    font-size:14px; padding:5px 10px; border-radius:6px; background:#e0f7fa; border:1px solid #26c6da; color:#00796b; text-align:center;
    cursor:pointer; 
  }
  .ft-node img { width:50px; height:50px; border-radius:50%; display:block; margin:0 auto 5px; }
</style>
</head>
<body>
<h1>我的家族樹</h1>
<div id="tree"></div>

<script>
document.addEventListener("DOMContentLoaded", function() {

  // 建立 FamilyTree
  var family = new FamilyTree(document.getElementById("tree"), {
    nodeBinding: { field_0: "name", field_1: "img" },
    editForm: { generateElementsFromFields: false },
    enableDragDrop: true, // 可拖曳節點
    enableZoom: true,     // 可縮放
    nodeTemplate: function(person) {
      var imgHTML = person.img ? '<img src="'+person.img+'" />' : '';
      return imgHTML + '<div>'+person.name+'</div>';
    }
  });

  // 從外部 JSON 載入資料
  fetch('family.json')
    .then(res => res.json())
    .then(data => {
      family.load(data);

      // 點擊節點顯示更多資訊
      family.on('click', function(nodeId) {
        var person = data.find(p => p.id === nodeId);
        if(person) {
          var info = '姓名：' + person.name + '\n';
          if(person.birthday) info += '生日：' + person.birthday + '\n';
          if(person.note) info += '備註：' + person.note;
          alert(info);
        }
      });
    })
    .catch(err => console.error('讀取家族資料錯誤:', err));
});
</script>
</body>
</html>
