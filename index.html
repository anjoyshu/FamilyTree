<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<title>專業互動族譜系統</title>
<script src="familytree.js"></script>
<style>
  body { font-family: Arial; margin:0; padding:0; background:#f9f9f9; }
  h1 { text-align:center; margin:20px 0; }
  #tree { width:100%; height:700px; border:1px solid #ccc; margin:0 auto; background:#fff; }
  
  /* 節點樣式 */
  .ft-node {
    width: 120px;
    text-align: center;
    padding: 5px;
    border-radius: 8px;
    background-color: #e0f7fa;
    border: 1px solid #26c6da;
    box-shadow: 0 2px 5px rgba(0,0,0,0.2);
    cursor: pointer;
  }

  .ft-node img {
    width: 70px;
    height: 70px;
    border-radius: 50%;
    display: block;
    margin: 0 auto 5px;
    border: 2px solid #26c6da;
  }

  /* 右側資訊欄 */
  #infoBox {
    position: fixed;
    top: 50px;
    right: 20px;
    width: 250px;
    background: #ffffff;
    border: 1px solid #ccc;
    padding: 10px;
    box-shadow: 0 2px 5px rgba(0,0,0,0.2);
    display: none;
    z-index: 1000;
  }

  #infoBox img { width: 80px; height: 80px; border-radius: 50%; margin-bottom: 10px; }
</style>
</head>
<body>
<h1>專業互動族譜系統</h1>
<div id="tree"></div>

<!-- 右側資訊欄 -->
<div id="infoBox">
  <img id="infoImg" src="" />
  <div id="infoName"></div>
  <div id="infoBirthday"></div>
  <div id="infoNote"></div>
</div>

<script>
document.addEventListener("DOMContentLoaded", function() {
  // 建立 FamilyTree
  var family = new FamilyTree(document.getElementById("tree"), {
    nodeBinding: { field_0: "name", field_1: "img" },
    editForm: { generateElementsFromFields: false },
    enableDragDrop: true,
    enableZoom: true,
    nodeTemplate: function(person) {
      // 節點本身照片 + 名稱
      var imgHTML = person.img ? '<img src="'+person.img+'" />' : '';
      return '<div class="ft-node">' + imgHTML + '<div>'+person.name+'</div></div>';
    }
  });

  // 讀取外部 JSON
  fetch('family.json')
    .then(res => res.json())
    .then(data => {
      family.load(data);

      // 點擊節點顯示右側資訊欄
      family.on('click', function(nodeId) {
        var person = data.find(p => p.id === nodeId);
        if(person) {
          document.getElementById('infoImg').src = person.img || '';
          document.getElementById('infoName').textContent = '姓名：' + person.name;
          document.getElementById('infoBirthday').textContent = person.birthday ? '生日：' + person.birthday : '';
          document.getElementById('infoNote').textContent = person.note || '';
          document.getElementById('infoBox').style.display = 'block';
        }
      });

      // 預設選中第一個節點
      if(data.length > 0) {
        var firstNode = data[0];
        document.getElementById('infoImg').src = firstNode.img || '';
        document.getElementById('infoName').textContent = '姓名：' + firstNode.name;
        document.getElementById('infoBirthday').textContent = firstNode.birthday ? '生日：' + firstNode.birthday : '';
        document.getElementById('infoNote').textContent = firstNode.note || '';
        document.getElementById('infoBox').style.display = 'block';
      }
    })
    .catch(err => console.error('讀取家族資料錯誤:', err));
});
</script>
</body>
</html>
