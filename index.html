<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Family Tree</title>

<script src="https://cdn.balkan.app/familytree2.js"></script>

<style>
#tree{
width:100%;
height:700px;
}
</style>

</head>

<body>

<div id="tree"></div>

<script>

document.addEventListener("DOMContentLoaded", function(){

var family = new FamilyTree(document.getElementById("tree"), {

nodeBinding: {
field_0: "name"
}

});

family.load([
{ id: 1, name: "Grandfather" },
{ id: 2, name: "Grandmother" },
{ id: 3, pid: 1, mid: 2, name: "Father" },
{ id: 4, name: "Mother" },
{ id: 5, pid: 3, mid: 4, name: "Me" }
]);

});

</script>

</body>
</html>
